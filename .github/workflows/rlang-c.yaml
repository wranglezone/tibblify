name: Update Vendored rlang

on:
  # schedule:
    # Run daily at 3am UTC
    # - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write        # To push the branch
  pull-requests: write   # To create/update PRs

jobs:
  update-rlang:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GH_PAT_WORKFLOWS }}

    steps:
      - name: Check for existing PR
        id: check_pr
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
        run: |
          PR_INFO=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,headRefName,title \
            --jq '.[] | select(.title == "chore: update vendored rlang sources") | "\(.number) \(.headRefName)"')
          if [ -n "$PR_INFO" ]; then
            echo "pr_exists=true" >> $GITHUB_OUTPUT
            echo "pr_number=$(echo "$PR_INFO" | awk '{print $1}')" >> $GITHUB_OUTPUT
            echo "pr_branch=$(echo "$PR_INFO" | awk '{print $2}')" >> $GITHUB_OUTPUT
          else
            echo "pr_exists=false" >> $GITHUB_OUTPUT
            echo "pr_branch=vendor/rlang-update" >> $GITHUB_OUTPUT
          fi

      - name: Checkout PR branch
        if: steps.check_pr.outputs.pr_exists == 'true'
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.check_pr.outputs.pr_branch }}
          token: ${{ secrets.GH_PAT_WORKFLOWS }}

      - name: Checkout main
        if: steps.check_pr.outputs.pr_exists == 'false'
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT_WORKFLOWS }}

      - name: Create new branch
        if: steps.check_pr.outputs.pr_exists == 'false'
        run: git checkout -b ${{ steps.check_pr.outputs.pr_branch }}

      - uses: ./.github/workflows/install
        with:
          token: ${{ secrets.GH_PAT_WORKFLOWS }}

      - name: Install dev rlang
        shell: Rscript {0}
        run: pak::pak("r-lib/rlang")

      - name: Install helpers
        shell: Rscript {0}
        run: pak::pak(c("usethis", "fs", "desc"))

      - name: Update vendored rlang sources
        shell: Rscript {0}
        run: |
          unlink("src/rlang", recursive = TRUE)
          rlang:::use_rlang_c_library()

      - name: Check for changes
        id: check_changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes_detected=true" >> $GITHUB_OUTPUT
            echo "Changes detected in rlang source."
          else
            echo "changes_detected=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          fi

      - name: Update DESCRIPTION
        if: steps.check_changes.outputs.changes_detected == 'true'
        shell: Rscript {0}
        run: |
          desc::desc_set(
            Remotes = sort(union(desc::desc_get_field("Remotes", default = character()), "r-lib/rlang")),
            normalize = TRUE
          )

      - name: Commit and push
        if: steps.check_changes.outputs.changes_detected == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: update vendored rlang sources"
          git push -u origin ${{ steps.check_pr.outputs.pr_branch }}

      - name: Open PR
        if: steps.check_changes.outputs.changes_detected == 'true' && steps.check_pr.outputs.pr_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
        run: |
          gh pr create \
            --title "chore: update vendored rlang sources" \
            --body "Automated update of vendored \`rlang\` C sources from \`r-lib/rlang\`." \
            --head ${{ steps.check_pr.outputs.pr_branch }} \
            --base main \
            --assignee jonthegeek

      - name: Assign existing PR
        if: steps.check_changes.outputs.changes_detected == 'true' && steps.check_pr.outputs.pr_exists == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_WORKFLOWS }}
        run: gh pr edit ${{ steps.check_pr.outputs.pr_number }} --add-assignee jonthegeek

